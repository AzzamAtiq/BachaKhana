name: bachakhana
description: Pakistan ka pehla food waste app — All Phases Complete

publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── UI & FONTS ──
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.9
  lottie: ^3.1.0

  # ── STATE ──
  provider: ^6.1.1

  # ── FIREBASE (Phase 2) ──
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.1.0
  firebase_messaging: ^15.0.0

  # ── MAPS (Phase 4) ──
  google_maps_flutter: ^2.6.0
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # ── PAYMENTS (Phase 3) ──
  url_launcher: ^6.3.0
  flutter_inappwebview: ^6.0.0

  # ── NOTIFICATIONS (Phase 3) ──
  flutter_local_notifications: ^17.0.0

  # ── STORAGE & UTILS ──
  shared_preferences: ^2.2.2
  image_picker: ^1.1.0
  intl: ^0.18.1
  uuid: ^4.3.3
  http: ^1.2.0
  crypto: ^3.0.3
  path_provider: ^2.1.3
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
